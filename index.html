<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bird Directory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">Birds</a>
    <nav>
      <a href="index.html" class="active">Directory</a>
      <a href="life-list.html">Life List</a>
    </nav>
  </div>
</header>

<main>
  <div class="search-wrap">
    <input
      type="search"
      id="search"
      class="search-input"
      placeholder="Search birds..."
      autocomplete="off"
      spellcheck="false"
    >
    <p class="count-label" id="count"></p>
  </div>

  <div class="grid" id="grid"></div>
</main>

<div class="modal-backdrop" id="backdrop">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    <img id="modal-img" src="" alt="">
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const FACT_SECTIONS = [
    ["Size & Shape",    "size_shape"],
    ["Color & Pattern", "color_pattern"],
    ["Where to Find",   "where_to_find"],
    ["What They Eat",   "what_they_eat"],
    ["Behavior",        "behavior"],
  ];

  let allBirds = [];

  function buildFactsHTML(facts) {
    return FACT_SECTIONS.map(([label, key]) => `
      <div class="fact">
        <div class="fact-label">${label}</div>
        <div class="fact-text">${facts[key] || ""}</div>
      </div>`).join("");
  }

  function buildCard(bird) {
    return `
      <article class="card" data-name="${bird.name}">
        <img src="${bird.photo}" alt="${bird.name}" loading="lazy">
        <div class="card-body">
          <h2 class="bird-name">${bird.name}</h2>
          ${buildFactsHTML(bird.facts)}
        </div>
      </article>`;
  }

  // Modal
  const backdrop   = document.getElementById("backdrop");
  const modalImg   = document.getElementById("modal-img");
  const modalBody  = document.getElementById("modal-body");

  function openModal(bird) {
    modalImg.src = bird.photo;
    modalImg.alt = bird.name;
    modalBody.innerHTML = `<h2 class="bird-name">${bird.name}</h2>${buildFactsHTML(bird.facts)}`;
    backdrop.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    backdrop.classList.remove("open");
    document.body.style.overflow = "";
  }

  document.getElementById("modal-close").addEventListener("click", closeModal);
  backdrop.addEventListener("click", e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  function render(birds) {
    const grid  = document.getElementById("grid");
    const count = document.getElementById("count");

    if (birds.length === 0) {
      grid.innerHTML = `<div class="empty">No birds match your search.</div>`;
      count.textContent = "";
      return;
    }

    grid.innerHTML = birds.map(buildCard).join("");
    count.textContent = `${birds.length} bird${birds.length !== 1 ? "s" : ""}`;

    grid.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => {
        const bird = allBirds.find(b => b.name === card.dataset.name);
        if (bird) openModal(bird);
      });
    });
  }

  document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase().trim();
    render(q ? allBirds.filter(b => b.name.toLowerCase().includes(q)) : allBirds);
  });

  fetch("site_data.json")
    .then(r => r.json())
    .then(data => {
      allBirds = data;
      render(allBirds);
    });
</script>

</body>
</html>
